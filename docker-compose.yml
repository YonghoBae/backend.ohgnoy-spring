services:
  ohgnoy_spring:
    build: .
    container_name: ohgnoy_api
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - web_network
      - internal_db_network
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ohgnoy-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_db_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  web_network:
    external: true
  internal_db_network:
    internal: true
